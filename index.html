<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHRISE - Компьютеры и техника</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
               <img src="img/img1.png" alt="Logo" class="logo-img">
               
            </div>
            <nav>
                <a href="#company">О КОМПАНИИ</a>
                <a href="#delivery">ОПЛАТА И ДОСТАВКА</a>
                <a href="#warranty">ГАРАНТИЯ</a>
                <a href="#service">СЕРВИС</a>
                <a href="#credit">КРЕДИТ</a>
                <a href="#trade">TRADE-IN</a>
                <a href="#contacts">КОНТАКТЫ</a>
            </nav>
            <div class="phone">+7 (913) 768-18-11</div>
        </div>
    </header>

    <main>
        <div class="container-main">
            <aside class="sidebar">
                <button class="catalog-btn">
                    <span class="menu-icon">☰</span> КАТАЛОГ
                </button>
                <nav class="category-menu">
                    <a href="category.html?cat=computers" class="category-link">КОМПЬЮТЕРЫ</a>
                    <a href="category.html?cat=notebooks" class="category-link">НОУТБУКИ</a>
                    <a href="category.html?cat=monitors" class="category-link">МОНИТОРЫ</a>
                    <a href="category.html?cat=keyboards" class="category-link">КЛАВИАТУРЫ</a>
                    <a href="category.html?cat=mice" class="category-link">КОМПЬЮТЕРНЫЕ МЫШИ</a>
                    <a href="category.html?cat=headsets" class="category-link">ГАРНИТУРА</a>
                    <a href="category.html?cat=gamepads" class="category-link">ГЕЙМПАДЫ</a>
                    <a href="category.html?cat=accessories" class="category-link">АКСЕССУАРЫ</a>
                </nav>
            </aside>

            <div class="content">
    <div class="top-bar">
        <div class="search-bar">
            <input type="text" placeholder="Ищите товары и категории">
            <button class="search-btn">🔍</button>
        </div>

        <div class="user-actions">
            <a href="#account" class="action-link">
                <span class="icon">👤</span>
                <span>ЛИЧНЫЙ КАБИНЕТ</span>
            </a>
            <a href="#favorites" class="action-link">
                <span class="icon">♡</span>
                <span>ИЗБРАННОЕ</span>
            </a>
            <a href="cart.html" class="action-link">
                <span class="icon">🛒</span>
                <span>КОРЗИНА</span>
            </a>
        </div>
    </div>

    <div class="hero-section">
        <img src="img/img4.jpg" alt="Ноутбук" class="hero-image">
        <button class="cta-button">К ПОКУПКАМ</button>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <img src="img/img2.png" alt="Игровой ноутбук">
            <h3>Аксессуары</h3>
            <button class="card-btn">Подробнее</button>
        </div>
        <div class="product-card">
            <img src="img/img3.png" alt="Клавиатура">
            <h3>Игровые ноутбуки</h3>
            <button class="card-btn">Подробнее</button>
        </div>
    </div>
  </div>
 </div>
 </main>

    <script src="database.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
