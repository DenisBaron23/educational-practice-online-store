<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - TECHRISE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
               <a href="index.html"><img src="img/img1.png" alt="Logo" class="logo-img"></a>
            </div>
            <nav>
                <a href="#company">О КОМПАНИИ</a>
                <a href="#delivery">ОПЛАТА И ДОСТАВКА</a>
                <a href="#warranty">ГАРАНТИЯ</a>
                <a href="#service">СЕРВИС</a>
                <a href="#credit">КРЕДИТ</a>
                <a href="#trade">TRADE-IN</a>
                <a href="#contacts">КОНТАКТЫ</a>
            </nav>
            <div class="phone">
                ПН-ПТ с 9:30 до 02:30<br>
                СБ-ВС С 07:30 до 20:00<br>
                +7 (913) 768-18-11
            </div>
        </div>
    </header>

    <main>
        <div class="container-main">
            <aside class="sidebar">
                <button class="catalog-btn">
                    <span class="menu-icon">☰</span> КАТАЛОГ
                </button>
            </aside>

            <div class="content">
                <div class="top-bar">
                    <div class="search-bar">
                        <input type="text" placeholder="Ищите товары и категории">
                        <button class="search-btn">🔍</button>
                    </div>

                    <div class="user-actions">
                        <a href="#account" class="action-link">
                            <span class="icon">👤</span>
                            <span>ЛИЧНЫЙ КАБИНЕТ</span>
                        </a>
                        <a href="#favorites" class="action-link">
                            <span class="icon">♡</span>
                            <span>ИЗБРАННОЕ</span>
                        </a>
                        <a href="cart.html" class="action-link">
                            <span class="icon">🛒</span>
                            <span>КОРЗИНА</span>
                        </a>
                    </div>
                </div>

                <div class="cart-container">
                    <h1 class="page-title">Оформление заказа</h1>
                    <p class="breadcrumb">Главная › Каталог товаров › Оформление заказа</p>

                   <div class="cart-content">
    <div class="cart-items">
        <h2 class="section-title">Ваши покупки</h2>
    </div>

    <div class="cart-summary">
        <h2 class="summary-title">В ЗАКАЗЕ</h2>
        
        <div class="summary-row">
            <span>ТОВАРЫ</span>
        </div>
        
        <div class="summary-row">
            <span>СУММА</span>
        </div>
        
        <div class="summary-row summary-total">
            <span>ИТОГО</span>
        </div>

        <button class="checkout-btn" onclick="window.location.href='checkout.html'">
            ОФОРМЛЕНИЕ ЗАКАЗА
        </button>
    </div>
</div>


                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="database.js"></script>
    <script src="script.js"></script>
    <script src="cart.js"></script>
</body>
</html>
